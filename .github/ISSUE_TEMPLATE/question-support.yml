name: Question / Support / 提问与帮助
description: Ask for guidance, context, or clarification before making a change. / 在动手前先询问背景、方向或具体帮助。
title: "[Question]: "
labels:
  - question
  - support
body:
  - type: dropdown
    id: topic
    attributes:
      label: Topic / 主题
      description: What kind of help do you need? / 你需要哪一类帮助？
      options:
        - Hardware / CAD
        - Firmware / STM32
        - Software / Linux SBC
        - Vision / Control
        - Documentation
        - Repository setup
    validations:
      required: true
  - type: textarea
    id: question
    attributes:
      label: Your question / 你的问题
      description: Describe what you are trying to understand or do. / 请说明你想搞清楚什么，或者你想做什么。
    validations:
      required: true
  - type: textarea
    id: tried
    attributes:
      label: What you already checked / 你已经看过什么
      description: Mention docs, files, or experiments you already looked at. / 请说明你已经查看过哪些文档、文件或实验结果。
  - type: textarea
    id: context
    attributes:
      label: Extra context / 补充上下文
      description: Add logs, sketches, assumptions, or constraints if helpful. / 如果有帮助，可以附上日志、草图、假设或约束条件。
